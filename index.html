<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Quién quiere detectar un millón de fugas?</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:32px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; max-width:700px; width:100%; margin-top:40px; }
    .card { padding:28px 20px; border-radius:20px; text-align:center; cursor:pointer; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); text-decoration:none; color:white; transition:all 0.25s; display:flex; flex-direction:column; align-items:center; gap:10px; }
    .card:hover { border-color:var(--gold); background:rgba(212,175,55,0.07); transform:translateY(-3px); }
    .card .icon { font-size:2.5rem; }
    .card h2 { font-size:1rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
    .card p  { font-size:11px; opacity:0.5; }
    .url-section { max-width:500px; width:100%; margin-top:24px; }
    .url-section label { font-size:10px; opacity:0.4; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:6px; }
    .url-section input { width:100%; padding:10px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white; font-size:11px; outline:none; font-family:monospace; }
    .url-section input:focus { border-color:var(--gold); }
    .saved-tag { font-size:9px; color:var(--green); font-weight:700; margin-top:4px; display:none; }
  </style>
</head>
<body>
  <div class="game-logo large">
    <span class="top-text">Quién quiere detectar</span>
    <span class="mid-text">UN MILLÓN</span>
    <span class="bot-text">de fugas</span>
    <div class="icon">💧</div>
  </div>

  <div class="cards">
    <a href="player.html" target="_blank" class="card">
      <span class="icon">📱</span>
      <h2>Jugador</h2>
      <p>Pantalla de concursante</p>
    </a>
    <a href="screen.html" target="_blank" class="card">
      <span class="icon">📺</span>
      <h2>Pantalla</h2>
      <p>Proyector / TV principal</p>
    </a>
    <a href="admin.html" target="_blank" class="card">
      <span class="icon">⚙️</span>
      <h2>Admin</h2>
      <p>Control del moderador</p>
    </a>
  </div>

  <div class="url-section" style="margin-top:32px">
    <label>URL del Backend (Apps Script)</label>
    <input id="url-input" type="text" placeholder="https://script.google.com/macros/s/.../exec"
           oninput="saveUrl(this.value)">
    <div id="saved-tag" class="saved-tag">✓ Guardado</div>
  </div>

  <script>
    var KEY = 'millon_script_url';
    var input = document.getElementById('url-input');
    var tag   = document.getElementById('saved-tag');
    input.value = localStorage.getItem(KEY) || '';
    var saveTimer;
    function saveUrl(v) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(function() {
        localStorage.setItem(KEY, v.trim());
        tag.style.display = 'block';
        setTimeout(function(){ tag.style.display='none'; }, 1500);
      }, 600);
    }
  </script>
</body>
</html>
