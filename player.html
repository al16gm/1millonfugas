<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Jugador — Millón de Fugas</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:16px; }
    .screen { width:100%; max-width:440px; }
    /* Login */
    #login-screen { display:flex; flex-direction:column; gap:16px; }
    .login-card { padding:28px; }
    .login-card h1 { font-size:1.5rem; font-weight:900; color:var(--gold); margin-bottom:4px; }
    .login-card p  { font-size:12px; opacity:0.5; margin-bottom:20px; }
    .field label { font-size:10px; text-transform:uppercase; letter-spacing:1px; opacity:0.5; display:block; margin-bottom:5px; }
    .field input  { width:100%; padding:12px 16px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s; }
    .field input:focus { border-color:var(--gold); }
    #login-error { color:var(--red); font-size:11px; font-weight:600; display:none; }
    /* Game */
    #game-screen { display:none; flex-direction:column; gap:14px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; }
    .player-info { font-size:12px; opacity:0.5; }
    #question-text { font-size:15px; font-weight:700; line-height:1.5; padding:20px 24px; text-align:center; min-height:80px; }
    #options-container { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    #submit-row { text-align:center; }
    #submit-row button { padding:12px 32px; border-radius:100px; background:linear-gradient(135deg,var(--gold),#AA8A2E); color:#020617; font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:1px; border:none; cursor:pointer; transition:all 0.2s; }
    #submit-row button:hover { transform:scale(1.03); }
    #feedback-msg { font-size:13px; text-align:center; padding:6px 0; min-height:28px; }
    #jokers-row { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; min-height:36px; }
    /* Poll */
    #poll-container { padding:16px; border-radius:16px; background:rgba(14,165,233,0.07); border:1px solid rgba(14,165,233,0.2); }
    #poll-container h3 { font-size:10px; text-transform:uppercase; font-weight:800; color:var(--cyan); margin-bottom:12px; text-align:center; }
    .poll-bars { display:flex; justify-content:space-around; gap:8px; height:120px; }
    /* Timer */
    .timer-wrap { display:flex; justify-content:center; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div style="text-align:center; margin-bottom:8px">
    <div class="game-logo" style="margin:0 auto 16px">
      <span class="top-text">Quién quiere detectar</span>
      <span class="mid-text">UN MILLÓN</span>
      <span class="bot-text">de fugas</span>
      <div class="icon">💧</div>
    </div>
  </div>

  <div class="glass-card login-card">
    <h1>¡Únete al juego!</h1>
    <p>Introduce tus datos para participar</p>

    <div class="field" style="margin-bottom:12px">
      <label>Tu nombre</label>
      <input id="player-name" type="text" placeholder="Ej: Ana García" autocomplete="given-name">
    </div>
    <div class="field" style="margin-bottom:18px">
      <label>Organización (opcional)</label>
      <input id="player-org" type="text" placeholder="Ej: Cetaqua" autocomplete="organization">
    </div>
    <div id="login-error" class="hidden"></div>
    <button id="login-btn" class="btn-action" style="width:100%" onclick="login()">ENTRAR AL JUEGO</button>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">

  <div class="top-bar">
    <div>
      <div id="player-name-display" class="player-info"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="player-score" class="score-badge">0 PTS</span>
      <button id="mute-btn" onclick="toggleMute()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;padding:4px">🔊</button>
    </div>
  </div>

  <div class="glass-card">
    <div id="game-status" style="text-align:center;padding:10px 0;font-size:12px;font-weight:700;opacity:0.5;text-transform:uppercase;letter-spacing:1px;min-height:32px"></div>

    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="100" height="100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="7"/>
          <circle id="timer-progress" cx="50" cy="50" r="45" fill="none" stroke="var(--gold)"
                  stroke-width="7" stroke-dasharray="282" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <span id="timer-text"></span>
      </div>
    </div>

    <div id="question-text">ESPERANDO INICIO DEL CONCURSO...</div>

    <div id="options-container" class="hidden" style="padding:0 16px 16px">
      <button class="option-btn" id="btn-A" onclick="selectOption('A')">
        <span class="letter">A</span><span class="label">---</span>
      </button>
      <button class="option-btn" id="btn-B" onclick="selectOption('B')">
        <span class="letter">B</span><span class="label">---</span>
      </button>
      <button class="option-btn" id="btn-C" onclick="selectOption('C')">
        <span class="letter">C</span><span class="label">---</span>
      </button>
      <button class="option-btn" id="btn-D" onclick="selectOption('D')">
        <span class="letter">D</span><span class="label">---</span>
      </button>
    </div>

    <div id="jokers-row" style="padding:0 16px 10px"></div>

    <div id="submit-row" class="hidden" style="padding:0 16px 16px">
      <button onclick="confirmAnswer()">✅ CONFIRMAR RESPUESTA</button>
    </div>

    <div id="feedback-msg" class="hidden" style="padding:0 16px 14px"></div>
  </div>

  <!-- Poll comodín público -->
  <div id="poll-container" class="hidden">
    <h3>👥 Votación del Público</h3>
    <div class="poll-bars">
      <div class="poll-bar-wrap">
        <div class="poll-bar-track"><div id="poll-fill-A" class="poll-bar-fill" style="height:0%"></div></div>
        <span style="font-weight:700;font-size:13px">A</span>
        <span id="poll-lbl-A" style="font-size:10px;opacity:0.5">0%</span>
      </div>
      <div class="poll-bar-wrap">
        <div class="poll-bar-track"><div id="poll-fill-B" class="poll-bar-fill" style="height:0%"></div></div>
        <span style="font-weight:700;font-size:13px">B</span>
        <span id="poll-lbl-B" style="font-size:10px;opacity:0.5">0%</span>
      </div>
      <div class="poll-bar-wrap">
        <div class="poll-bar-track"><div id="poll-fill-C" class="poll-bar-fill" style="height:0%"></div></div>
        <span style="font-weight:700;font-size:13px">C</span>
        <span id="poll-lbl-C" style="font-size:10px;opacity:0.5">0%</span>
      </div>
      <div class="poll-bar-wrap">
        <div class="poll-bar-track"><div id="poll-fill-D" class="poll-bar-fill" style="height:0%"></div></div>
        <span style="font-weight:700;font-size:13px">D</span>
        <span id="poll-lbl-D" style="font-size:10px;opacity:0.5">0%</span>
      </div>
    </div>
  </div>

</div>

<audio id="audio-player" preload="none"></audio>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  // Mostrar nombre del jugador en pantalla
  document.addEventListener('DOMContentLoaded', function() {
    var n = localStorage.getItem('millon_player_name');
    var el = document.getElementById('player-name-display');
    if (el && n) el.textContent = '👤 ' + n;
  });
</script>
<script src="js/player.js"></script>
</body>
</html>
