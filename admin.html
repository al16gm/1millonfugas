<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Millón de Fugas</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { overflow:hidden; }
    .layout { display:grid; grid-template-columns:300px 1fr; height:100vh; }

    /* Sidebar */
    .sidebar { background:rgba(0,0,0,0.4); border-right:1px solid rgba(212,175,55,0.15); display:flex; flex-direction:column; overflow:hidden; }
    .sidebar-header { padding:16px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; gap:10px; }
    .sidebar-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:18px; }

    /* Main panel */
    .main-panel { background:rgba(0,0,0,0.15); overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:20px; }

    /* Section labels */
    .section-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:2px; opacity:0.35; margin-bottom:8px; }

    /* Inputs */
    .inp { padding:8px 10px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:white; font-size:11px; font-family:inherit; outline:none; width:100%; }
    .inp:focus { border-color:var(--gold); }
    .inp-sm { width:72px; text-align:center; }

    /* Flow buttons */
    .flow-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

    /* Reveal buttons */
    .reveal-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; }
    .rev-btn { padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; font-weight:800; font-size:14px; cursor:pointer; text-align:center; transition:all 0.2s; }
    .rev-btn:hover { border-color:var(--gold); }

    /* Confirm reveal */
    #btn-reveal-confirm { width:100%; padding:10px; border-radius:10px; background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3); color:var(--green); font-size:10px; font-weight:800; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
    #btn-reveal-confirm:hover:not(:disabled) { background:rgba(16,185,129,0.25); }
    #btn-reveal-confirm:disabled { opacity:0.35; cursor:default; }

    /* Continue big button */
    #btn-continue { padding:10px 20px; border-radius:12px; background:var(--gold); color:#020617; font-weight:900; font-size:12px; text-transform:uppercase; border:none; cursor:pointer; transition:all 0.2s; letter-spacing:1px; }
    #btn-continue:hover { filter:brightness(1.1); transform:scale(1.02); }

    /* Joker & music grid */
    .joker-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
    .music-grid  { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

    /* Log */
    #admin-log { height:80px; overflow-y:auto; padding:8px; background:rgba(0,0,0,0.4); border-radius:8px; border:1px solid rgba(255,255,255,0.05); font-family:monospace; font-size:8px; }

    /* Scrollable lists */
    .scroll-list { max-height:260px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; padding:2px; }

    /* Question preview */
    #q-preview { padding:14px; min-height:120px; }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
  <div class="sidebar">

    <div class="sidebar-header">
      <div style="width:32px;height:32px;border-radius:8px;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--gold)">M</div>
      <div style="flex:1">
        <div style="font-size:11px;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:1px">Admin</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
          <div id="status-dot" class="status-dot"></div>
          <span id="status-label" style="font-size:9px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:2px">---</span>
        </div>
      </div>
      <div>
        <div style="font-size:8px;opacity:0.35;text-align:right" id="current-q-label">Pregunta #1</div>
        <button id="btn-continue" onclick="continueFlow()">CONTINUAR ▶</button>
      </div>
    </div>

    <div class="sidebar-body">

      <!-- Flujo -->
      <div>
        <div class="section-label">Flujo de Juego</div>
        <div class="flow-grid">
          <button id="flow-ESPERA"   class="ctrl-btn" onclick="goTo('ESPERA')">  <span class="num">01</span>ESPERA</button>
          <button id="flow-PREGUNTA" class="ctrl-btn" onclick="goTo('PREGUNTA')"><span class="num">02</span>PREGUNTA</button>
          <button id="flow-ACTIVA"   class="ctrl-btn cyan" onclick="toggleTimer()"><span class="num">03</span>▶ ACTIVAR</button>
          <button id="flow-CERRADA"  class="ctrl-btn" onclick="goTo('CERRADA')"> <span class="num">04</span>CERRAR</button>
          <button id="flow-REVELAR"  class="ctrl-btn" onclick="goTo('REVELAR')"> <span class="num">05</span>REVELAR</button>
          <button id="flow-RANKING"  class="ctrl-btn" onclick="goTo('RANKING')"> <span class="num">06</span>RANKING</button>
        </div>
      </div>

      <!-- Tiempo + pregunta -->
      <div>
        <div class="section-label">Pregunta & Tiempo</div>
        <div style="display:flex;gap:6px;align-items:flex-end">
          <div style="flex:1">
            <div style="font-size:8px;opacity:0.4;margin-bottom:4px">ID PREGUNTA</div>
            <input type="number" id="q-id-input" class="inp inp-sm" value="1" min="1">
          </div>
          <div style="flex:1">
            <div style="font-size:8px;opacity:0.4;margin-bottom:4px">TIEMPO (ms)</div>
            <input type="number" id="time-input" class="inp" value="10000" step="1000">
          </div>
          <button class="ctrl-btn" style="padding:8px 12px;font-size:10px" onclick="changeQuestion()">IR</button>
        </div>
      </div>

      <!-- Revelar respuesta -->
      <div>
        <div class="section-label">Revelar Respuesta</div>
        <div class="reveal-grid" style="margin-bottom:6px">
          <div class="rev-btn" id="rev-A" onclick="selectReveal('A')">A</div>
          <div class="rev-btn" id="rev-B" onclick="selectReveal('B')">B</div>
          <div class="rev-btn" id="rev-C" onclick="selectReveal('C')">C</div>
          <div class="rev-btn" id="rev-D" onclick="selectReveal('D')">D</div>
        </div>
        <button id="btn-reveal-confirm" disabled onclick="confirmReveal()">✓ CONFIRMAR Y REVELAR</button>
      </div>

      <!-- Comodines -->
      <div>
        <div class="section-label">Comodines</div>
        <div class="joker-grid">
          <button id="joker-50"      class="ctrl-btn" onclick="toggleJoker('50')">✂️<br>50%</button>
          <button id="joker-publico" class="ctrl-btn" onclick="toggleJoker('publico')">👥<br>Público</button>
          <button id="joker-llamada" class="ctrl-btn" onclick="toggleJoker('llamada')">📞<br>Llamada</button>
        </div>
      </div>

      <!-- Música -->
      <div>
        <div class="section-label">Música de Fondo</div>
        <div class="music-grid">
          <button id="music-on"  class="ctrl-btn green" onclick="setMusic(true)">▶ MÚSICA ON</button>
          <button id="music-off" class="ctrl-btn danger" onclick="setMusic(false)">⏹ MÚSICA OFF</button>
        </div>
      </div>

      <!-- Utilidades -->
      <div>
        <div class="section-label">Utilidades</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
          <button class="ctrl-btn" onclick="startPolling(onStateUpdate,1500)">↺ REFRESCAR</button>
          <button class="ctrl-btn danger" onclick="resetGame()">⚠ RESET</button>
        </div>
        <div id="admin-log"><p style="opacity:0.3">Sistema listo...</p></div>
      </div>

    </div>
  </div>

  <!-- ── MAIN PANEL ──────────────────────────────────────────────────────── -->
  <div class="main-panel">

    <!-- Preview pregunta -->
    <div>
      <div class="section-label">Vista Previa de la Pregunta Actual</div>
      <div class="glass-card" id="q-preview">
        <p style="opacity:0.4;font-style:italic;font-size:12px">Cargando...</p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <!-- Lista de preguntas -->
      <div>
        <div class="section-label">Preguntas <span style="opacity:0.5;font-weight:400">(clic para ir)</span></div>
        <div class="glass-card" style="padding:10px">
          <div id="questions-list" class="scroll-list">
            <p style="opacity:0.3;font-size:10px;text-align:center;padding:12px">Cargando...</p>
          </div>
        </div>
      </div>

      <!-- Participantes -->
      <div>
        <div class="section-label">Participantes (<span id="participant-count">0</span>)</div>
        <div class="glass-card" style="padding:10px">
          <div id="participants-list" class="scroll-list">
            <p style="opacity:0.3;font-size:10px;text-align:center;padding:12px">Cargando...</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
